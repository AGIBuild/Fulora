  summary: >-
    Concrete implementation of <xref href="Agibuild.Fulora.IWebAuthBroker" data-throw-if-not-resolved="false"></xref> that opens a <xref href="Agibuild.Fulora.IWebDialog" data-throw-if-not-resolved="false"></xref>

    to perform the OAuth authentication flow.

    <p>

    Flow:

    1. Create an ephemeral WebDialog via <xref href="Agibuild.Fulora.IWebDialogFactory" data-throw-if-not-resolved="false"></xref>.

    2. Navigate to <xref href="Agibuild.Fulora.AuthOptions.AuthorizeUri" data-throw-if-not-resolved="false"></xref>.

    3. Listen for <xref href="Agibuild.Fulora.IWebView.NavigationStarted" data-throw-if-not-resolved="false"></xref> to detect the callback URI.

    4. On match: close dialog, return <xref href="Agibuild.Fulora.WebAuthResult" data-throw-if-not-resolved="false"></xref> with Success.

    5. On user close: return UserCancel.

    6. On timeout: return Timeout.

    </p>
