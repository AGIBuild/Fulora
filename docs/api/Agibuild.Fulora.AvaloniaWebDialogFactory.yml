  summary: >-
    Production implementation of <xref href="Agibuild.Fulora.IWebDialogFactory" data-throw-if-not-resolved="false"></xref> that creates

    <xref href="Agibuild.Fulora.AvaloniaWebDialog" data-throw-if-not-resolved="false"></xref> instances backed by Avalonia <code>Window</code> + <code>WebView</code>.

    <p>

    Register via DI or instantiate directly:

    <pre><code class="lang-csharp">var factory = new AvaloniaWebDialogFactory();

    using var dialog = factory.Create();

    dialog.Show();

    await dialog.NavigateAsync(new Uri("https://example.com"));</code></pre>

    </p>
