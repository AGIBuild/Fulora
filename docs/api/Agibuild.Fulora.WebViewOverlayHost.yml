  summary: >-
    Manages a transparent companion window for rendering Avalonia controls above a WebView.

    Uses a real borderless Avalonia <xref href="Avalonia.Controls.Window" data-throw-if-not-resolved="false"></xref> as a child of the parent window,

    positioned to exactly cover the WebView bounds.
