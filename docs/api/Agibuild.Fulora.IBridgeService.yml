  assemblies:
  - Agibuild.Fulora.Core
  namespace: Agibuild.Fulora
  summary: >-
    Type-safe bridge service for exposing C# services to JavaScript and importing JS services into C#.

    <p>

    Use <xref href="Agibuild.Fulora.IBridgeService.Expose%60%601(%60%600%2cAgibuild.Fulora.BridgeOptions)" data-throw-if-not-resolved="false"></xref> with <xref href="Agibuild.Fulora.JsExportAttribute" data-throw-if-not-resolved="false"></xref> interfaces to register

    C# implementations callable from JS.

    </p>

    <p>

    Use <xref href="Agibuild.Fulora.IBridgeService.GetProxy%60%601" data-throw-if-not-resolved="false"></xref> with <xref href="Agibuild.Fulora.JsImportAttribute" data-throw-if-not-resolved="false"></xref> interfaces to obtain

    a typed C# proxy that calls JS methods.

    </p>
  example: []
  syntax:
    content: public interface IBridgeService
    content.vb: Public Interface IBridgeService
  extensionMethods:
