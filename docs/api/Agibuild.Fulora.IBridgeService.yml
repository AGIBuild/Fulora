    commentId: T:System.InvalidOperationException
    description: <code class="typeparamref">T</code> is not decorated with <xref href="Agibuild.Fulora.JsImportAttribute" data-throw-if-not-resolved="false"></xref>.
  - type: System.ObjectDisposedException
    commentId: T:System.ObjectDisposedException
    description: The bridge has been disposed.
