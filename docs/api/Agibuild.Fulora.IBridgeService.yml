  namespace: Agibuild.Fulora
  summary: >-
    Registers a C# implementation of a <xref href="Agibuild.Fulora.JsExportAttribute" data-throw-if-not-resolved="false"></xref>-marked interface,

    making its methods callable from JavaScript via the bridge.
  example: []
  syntax:
    content: 'void Expose<T>(T implementation, BridgeOptions? options = null) where T : class'
    parameters:
    - id: implementation
      type: '{T}'
      description: The C# object implementing <code class="typeparamref">T</code>.
    - id: options
      type: Agibuild.Fulora.BridgeOptions
      description: Optional per-service bridge options (origin allowlist, etc.).
    typeParameters:
    - id: T
      description: An interface decorated with <xref href="Agibuild.Fulora.JsExportAttribute" data-throw-if-not-resolved="false"></xref>.
    content.vb: Sub Expose(Of T As Class)(implementation As T, options As BridgeOptions = Nothing)
  overload: Agibuild.Fulora.IBridgeService.Expose*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: >-
      <code class="typeparamref">T</code> is not decorated with <xref href="Agibuild.Fulora.JsExportAttribute" data-throw-if-not-resolved="false"></xref>,

      or the service has already been exposed without being removed first.
  - type: System.ObjectDisposedException
    commentId: T:System.ObjectDisposedException
    description: The bridge has been disposed.
