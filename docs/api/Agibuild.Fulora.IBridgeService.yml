  summary: >-
    Returns a typed proxy for a <xref href="Agibuild.Fulora.JsImportAttribute" data-throw-if-not-resolved="false"></xref>-marked interface.

    Each method call on the proxy is forwarded to the corresponding JS implementation via RPC.
  example: []
  syntax:
    content: 'T GetProxy<T>() where T : class'
    typeParameters:
    - id: T
      description: An interface decorated with <xref href="Agibuild.Fulora.JsImportAttribute" data-throw-if-not-resolved="false"></xref>.
    return:
      type: '{T}'
      description: A proxy implementing <code class="typeparamref">T</code>.
    content.vb: Function GetProxy(Of T As Class)() As T
  overload: Agibuild.Fulora.IBridgeService.GetProxy*
  exceptions:
