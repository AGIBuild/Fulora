  assemblies:
  - Agibuild.Fulora.Runtime
  namespace: Agibuild.Fulora
  summary: >-
    Bootstraps the WebView with SPA navigation and bridge service registration in one deterministic call.

    <p>

    When <xref href="Agibuild.Fulora.SpaBootstrapOptions.DevServerUrl" data-throw-if-not-resolved="false"></xref> is set, navigates directly to the dev server.

    Otherwise, navigates to the SPA entry point (caller must enable SPA hosting beforehand for production).

    </p>

    <p>

    After successful navigation, configures bridge services via <xref href="Agibuild.Fulora.SpaBootstrapOptions.ConfigureBridge" data-throw-if-not-resolved="false"></xref>

    and dispatches the <code>agWebViewReady</code> event to the page.

    </p>
  example: []
  syntax:
    content: public static Task BootstrapSpaAsync(this IWebView webView, SpaBootstrapOptions options, CancellationToken cancellationToken = default)
    parameters:
    - id: webView
      type: Agibuild.Fulora.IWebView
    - id: options
      type: Agibuild.Fulora.SpaBootstrapOptions
    - id: cancellationToken
      type: System.Threading.CancellationToken
    return:
      type: System.Threading.Tasks.Task
    content.vb: Public Shared Function BootstrapSpaAsync(webView As IWebView, options As SpaBootstrapOptions, cancellationToken As CancellationToken = Nothing) As Task
  overload: Agibuild.Fulora.WebViewBootstrapExtensions.BootstrapSpaAsync*
