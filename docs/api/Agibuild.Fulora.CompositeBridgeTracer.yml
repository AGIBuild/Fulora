  summary: >-
    An <xref href="Agibuild.Fulora.IBridgeTracer" data-throw-if-not-resolved="false"></xref> that holds multiple tracers and forwards each callback to all.

    Exceptions from one tracer are caught and do not prevent other tracers from receiving events.

    <xref href="Agibuild.Fulora.NullBridgeTracer" data-throw-if-not-resolved="false"></xref> instances are filtered out and not included.
