  assemblies:
  - Agibuild.Fulora
  namespace: Agibuild.Fulora
  summary: >-
    Production implementation of <xref href="Agibuild.Fulora.IWebDialog" data-throw-if-not-resolved="false"></xref> backed by an Avalonia <xref href="Avalonia.Controls.Window" data-throw-if-not-resolved="false"></xref>

    containing a <xref href="Agibuild.Fulora.WebView" data-throw-if-not-resolved="false"></xref> control. The WebView control handles all native platform

    adapter creation, NativeControlHost lifecycle, and attachment automatically.

    <p>

    Usage:

    <pre><code class="lang-csharp">var dialog = new AvaloniaWebDialog();

    dialog.Title = "Sign In";

    dialog.Show();

    await dialog.NavigateAsync(new Uri("https://example.com"));</code></pre>

    </p>
