name: Mutation Testing

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC
  workflow_dispatch:       # Manual trigger

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUKE_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mutation-test:
    name: Stryker.NET Mutation Testing
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install .NET workloads
        run: dotnet workload install android ios macos

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build Agibuild.Fulora.sln --configuration Release

      - name: Run Stryker mutation testing
        run: dotnet stryker --config-file ../../stryker-config.json --output ../../artifacts/mutation-report
        working-directory: tests/Agibuild.Fulora.UnitTests

      - name: Upload mutation report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: mutation-report
          path: artifacts/mutation-report/
          if-no-files-found: warn
