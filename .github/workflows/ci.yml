name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUKE_TELEMETRY_OPTOUT: true

jobs:
  # ────────────────────────────── Build & Test (macOS) ──────────────────────────
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full git history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install .NET workloads
        run: dotnet workload install android ios macos

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build bridge package
        run: npm install && npm run build
        working-directory: packages/bridge

      - name: Install web app dependencies
        run: npm install
        working-directory: samples/avalonia-ai-chat/AvaloniAiChat.Web

      - name: Run CI (Compile + Coverage + Pack)
        run: ./build.sh --target Ci --configuration Release

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-macos
          path: artifacts/packages/*.nupkg
          if-no-files-found: warn

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-macos
          path: artifacts/test-results/
          if-no-files-found: ignore

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-macos
          path: artifacts/coverage-report/
          if-no-files-found: ignore

  # ────────────────────────────── Build & Test (Windows) ────────────────────────
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install .NET workloads
        run: dotnet workload install android
        shell: pwsh

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build bridge package
        run: npm install && npm run build
        working-directory: packages/bridge

      - name: Install web app dependencies
        run: npm install
        working-directory: samples/avalonia-ai-chat/AvaloniAiChat.Web

      - name: Run CI (Compile + Coverage + Pack)
        run: ./build.ps1 -Target Ci -Configuration Release

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-windows
          path: artifacts/test-results/
          if-no-files-found: ignore

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-windows
          path: artifacts/coverage-report/
          if-no-files-found: ignore

  # ────────────────────────────── Build & Test (Linux) ─────────────────────────
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install .NET workloads
        run: dotnet workload install android

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build bridge package
        run: npm install && npm run build
        working-directory: packages/bridge

      - name: Install web app dependencies
        run: npm install
        working-directory: samples/avalonia-ai-chat/AvaloniAiChat.Web

      - name: Run CI (Compile + Coverage + Pack)
        run: ./build.sh --target Ci --configuration Release

      - name: Validate NativeAOT publish
        run: |
          dotnet publish tests/Agibuild.Fulora.Integration.NugetPackageTests/Agibuild.Fulora.Integration.NugetPackageTests.csproj \
            -p:PublishAot=true \
            -r linux-x64 \
            -p:AgibuildPackageVersion='*-*'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-linux
          path: artifacts/test-results/
          if-no-files-found: ignore

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-linux
          path: artifacts/coverage-report/
          if-no-files-found: ignore
