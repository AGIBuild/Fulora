name: Release

on:
  push:
    tags: ['v*']      # Triggered by version tags like v1.0.0, v0.2.1-preview
  workflow_dispatch:   # Allow manual triggering (select a tag from the UI)

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUKE_TELEMETRY_OPTOUT: true

jobs:
  # ────────────────────────────── Build, Test & Validate (macOS) ────────────────
  build:
    name: Build, Test & Validate (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full git history to calculate version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install .NET workloads
        run: dotnet workload install android ios macos

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run release pipeline (Coverage + Integration Tests + NuGet Package Test)
        run: ./build.sh --target CiPublish --skip Publish --configuration Release --package-version "${{ steps.version.outputs.version }}"

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/packages/*.nupkg

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-release
          path: artifacts/test-results/
          if-no-files-found: ignore

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-release
          path: artifacts/coverage-report/
          if-no-files-found: ignore

  # ────────────────────────────── Publish to NuGet ─────────────────────────────
  publish:
    name: Publish to NuGet
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: artifacts/packages

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

  # ────────────────────────────── Publish to npm ──────────────────────────────
  npm-publish:
    name: Publish @agibuild/bridge to npm
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: npm
    defaults:
      run:
        working-directory: packages/bridge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "dist_tag=preview" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          npm publish --access public --tag "${{ steps.version.outputs.dist_tag }}" 2>&1 || {
            EXIT_CODE=$?
            if npm view "@agibuild/bridge@${{ steps.version.outputs.version }}" version 2>/dev/null; then
              echo "::warning::Version ${{ steps.version.outputs.version }} already published to npm (duplicate)"
            else
              echo "::error::npm publish failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ────────────────────────────── GitHub Release ───────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [build, publish, npm-publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
